name: Verify Examples

on: [workflow_call]

jobs:
  verify-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: cd examples/subscriber && uv sync

      - name: Start LocalNet
        run: uvx algokit localnet start

      - name: Verify examples
        run: |
          cd examples/subscriber
          chmod +x verify-all.sh
          ./verify-all.sh

      - name: Stop LocalNet
        if: always()
        run: uvx algokit localnet stop

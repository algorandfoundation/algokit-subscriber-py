name: Build and Test Python

on:
  workflow_call:

jobs:
  build-python:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: algorandfoundation/algokit-shared-config/.github/actions/setup-algokit-python@main
        with:
          python-version: ${{ matrix.python }}
          install-algokit: "false"

      - name: pytest + coverage
        shell: bash
        env:
          COVERAGE_CORE: sysmon
        run: |
          set -o pipefail
          uv run pytest --junitxml=pytest-junit.xml --cov | tee pytest-coverage.txt

      - name: pytest coverage comment
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        uses: MishaKav/pytest-coverage-comment@v1.2.0
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest-junit.xml

      - name: Upload test results and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python }}
          path: pytest-junit.xml
          retention-days: 30

      - name: Build Wheel
        run: uv build